<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My To-Do List</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css"/>
</head>
<body>

    <div class="container mt-5">
        <h1>My To-Do List</h1>
        
        <div class="d-flex justify-content-center">
            <div style="width: 400px;">
                <div class="input-group mb-4">
                    <input type="text" id="task-input" class="form-control" placeholder="Add new task...">
                    <button class="btn btn-info" id="add-btn">+</button>
                </div>

                <div id="task-list">
                    <div class="task-item mb-2 d-flex align-items-center justify-content-between">
                        <div>
                            <input type="checkbox" class="form-check-input me-2">
                            <span class="task-text">Learn jQuery selectors</span>
                        </div>
                        <span class="delete" style="cursor:pointer; font-weight:bold;">×</span>
                    </div>

                    <div class="task-item mb-2 d-flex align-items-center justify-content-between">
                        <div>
                            <input type="checkbox" class="form-check-input me-2">
                            <span class="task-text">Setup Project Environment</span>
                        </div>
                        <span class="delete" style="cursor:pointer; font-weight:bold;">×</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
